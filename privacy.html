      <h1>隱私權政策</h1>
      <p>本網站提供線上簡轉繁、繁轉簡與字幕批量轉換功能。使用者匯入的字幕檔會在瀏覽器內處理，不會上傳到本網站伺服器。</p>
      <h2>第三方服務</h2>
      <p>本網站使用 CDN 載入 OpenCC 與 JSZip 函式庫。未來若啟用 Google AdSense，Google 可能依其政策使用 Cookie 或類似技術提供廣告服務。</p>
      <h2>資料保留</h2>
      <p>本網站不建立帳號系統，也不儲存使用者匯入的字幕內容。</p>
